version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: snapduel-postgres
    restart: always
    environment:
      POSTGRES_USER: snapduel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: snapduel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapduel"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME}/snapduel-backend:${IMAGE_TAG}
    container_name: snapduel-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://snapduel:${POSTGRES_PASSWORD}@postgres:5432/snapduel
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      JWT_SECRET: ${JWT_SECRET}
      TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}

volumes:
  pgdata:
