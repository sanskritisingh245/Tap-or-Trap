version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: snapduel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME}/snapduel-backend:${IMAGE_TAG}
    container_name: snapduel-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      JWT_SECRET: ${JWT_SECRET}
      TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
