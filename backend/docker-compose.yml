version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: snapduel-postgres
    environment:
      POSTGRES_DB: snapduel
      POSTGRES_USER: snapduel
      POSTGRES_PASSWORD: snapduel
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U snapduel']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: snapduel-backend
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://snapduel:snapduel@postgres:5432/snapduel
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
