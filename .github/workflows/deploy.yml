name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/snapduel-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/snapduel-backend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create app directory on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p ~/snapduel

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.production.yml"
          target: "~/snapduel/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TREASURY_PRIVATE_KEY: ${{ secrets.TREASURY_PRIVATE_KEY }}
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,POSTGRES_PASSWORD,SOLANA_RPC_URL,JWT_SECRET,TREASURY_PRIVATE_KEY
          script: |
            cd ~/snapduel
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            printf 'DOCKERHUB_USERNAME=%s\nIMAGE_TAG=%s\nPOSTGRES_PASSWORD=%s\nSOLANA_RPC_URL=%s\nJWT_SECRET=%s\nTREASURY_PRIVATE_KEY=%s\n' \
              "$DOCKERHUB_USERNAME" "$IMAGE_TAG" "$POSTGRES_PASSWORD" "$SOLANA_RPC_URL" "$JWT_SECRET" "$TREASURY_PRIVATE_KEY" \
              > .env.production

            docker compose -f docker-compose.production.yml --env-file .env.production pull
            docker compose -f docker-compose.production.yml --env-file .env.production up -d --remove-orphans
            docker system prune -af
